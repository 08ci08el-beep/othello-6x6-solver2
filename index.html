<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しえる専用 6×6 オセロソルバー</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧠 しえる専用 6×6 オセロソルバー</h1>

<div class="toolbar">
<button id="blackBtn">⚫ 黒</button>
<button id="whiteBtn">⚪ 白</button>
<button id="eraseBtn">🗑 消す</button>
<button id="resetBtn">🧹 全消し</button>
<button id="startBtn">🎮 初期配置</button>
</div>

<p id="mode">現在：黒モード</p>

<div id="board"></div>
  <p id="turn">手番：⚫ 黒</p>

<p id="score">
黒：2　白：2
</p>

<button id="legalBtn">
🟢 合法手表示
</button>

<script src="script.js"></script>

</body>
</html>
